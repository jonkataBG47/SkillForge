{%extends "base.html"%}
{%block content%}
    <h2>Confirm Delete Profile</h2>
    <p>Are you sure you want to delete your profile? This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete My Profile</button>
        <a href="{% url 'profile' %}" class="btn btn-secondary">No, Keep My Profile</a>
    </form>
{%endblock%}
